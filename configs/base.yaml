# =============================================================================
# base.yaml — 高波数 Helmholtz 神经算子 2D 原型默认配置
# =============================================================================
# 本文件定义所有参数的默认值，对应 DEV_PLAN.md 第 5 节 M0 规范。
# 修改参数前请同步更新 DEV_PLAN.md。

# -----------------------------------------------------------------------------
# 物理参数
# -----------------------------------------------------------------------------
physics:
  omega: 30.0                    # 圆频率（先用低频调试）
  source_pos: [0.5, 0.5]        # 震源物理坐标（归一化域中心）

# -----------------------------------------------------------------------------
# 网格参数
# -----------------------------------------------------------------------------
grid:
  domain: [0.0, 1.0, 0.0, 1.0]  # [x_min, x_max, y_min, y_max]
  nx: 128                        # x 方向格点数（不含 PML）
  ny: 128                        # y 方向格点数（不含 PML）

# -----------------------------------------------------------------------------
# 介质参数
# -----------------------------------------------------------------------------
medium:
  c_background: 1.0              # 背景波速
  velocity_model: "homogeneous"  # 速度模型: homogeneous | smooth_lens | layered

# -----------------------------------------------------------------------------
# PML 参数
# -----------------------------------------------------------------------------
pml:
  width: 20                      # PML 层格点数
  power: 2                       # 阻尼剖面幂次（二次方）
  R0: 1.0e-6                     # 目标反射系数

# -----------------------------------------------------------------------------
# Eikonal 参数
# -----------------------------------------------------------------------------
eikonal:
  fsm_max_iter: 100              # FSM 最大扫描轮次
  fsm_tol: 1.0e-10               # FSM 收敛阈值
  source_freeze_radius: 1        # 震源冻结圈数（网格数）
  precision: "float64"           # FSM 运算精度

# -----------------------------------------------------------------------------
# 网络参数（M7 之后启用）
# -----------------------------------------------------------------------------
model:
  nsno_blocks: 4                 # NSNO Block 数（多重散射迭代数）
  nsno_channels: 32              # 隐层通道数
  fno_modes: 16                  # FNO 保留的傅里叶模式数
  activation: "gelu"             # 激活函数

# -----------------------------------------------------------------------------
# Loss 参数
# -----------------------------------------------------------------------------
loss:
  source_mask_radius: 1.5        # 震源穿孔掩码半径（单位: h）
  pml_rhs_zero: true             # PML 内 RHS 强制为 0
  omega2_normalize: true         # 残差两端除以 ω²

# -----------------------------------------------------------------------------
# 训练参数（M9 之后启用）
# -----------------------------------------------------------------------------
training:
  lr: 1.0e-3                     # 学习率
  epochs: 1000                   # 训练轮次
  batch_size: 1                  # 当前单样本
  lambda_pde: 1.0                # PDE Loss 权重
  lambda_data: 0.0               # 数据 Loss 权重（无监督标签时为 0）

# -----------------------------------------------------------------------------
# 日志与输出
# -----------------------------------------------------------------------------
logging:
  level: "INFO"                  # 日志级别: DEBUG | INFO | WARNING | ERROR
  save_dir: "outputs"            # 输出保存目录
  save_interval: 100             # 保存间隔（epoch）
